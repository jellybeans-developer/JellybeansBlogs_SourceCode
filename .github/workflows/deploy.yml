name: Hexo Deploy

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: cd blog && npm install

      - name: Patch Keep config
        run: |
          python3 - <<EOF
          path = "blog/node_modules/hexo-theme-keep/_config.yml"
          with open(path, "r", encoding="utf-8") as f:
              data = f.read()
      
          data = data.replace("Home: /", "# Home: /")
          data = data.replace("Archives: /archives/", "# Archives: /archives/")
      
          with open(path, "w", encoding="utf-8") as f:
              f.write(data)
          EOF
      
      - name: Generate Hexo
        run: cd blog && npx hexo generate

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "blog/public/*"
          target: "/data/JellyBeans_Blogs"

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /data/JellyBeans_Blogs
            docker compose restart nginx
